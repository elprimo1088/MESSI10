<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EuroLeague Interactive Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #111; 
            color: white; 
            margin: 0; 
            min-height: 100vh;
        }
        
        #loginPage { 
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('euroleague.png');
            background-size: cover; 
            background-position: center; 
            height: 100vh; 
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .custom-card {
            background: rgba(30, 30, 30, 0.95);
            border-radius: 15px;
            border: 1px solid #333;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }

        .page { display: none; padding-top: 50px; padding-bottom: 50px; }
        
        .img-fluid-custom {
            border-radius: 10px;
            border: 2px solid #444;
            margin-bottom: 20px;
            width: 100%;
            height: auto;
        }

        .nav-btn {
            padding: 15px;
            font-weight: bold;
            transition: transform 0.2s;
        }
        .nav-btn:hover { transform: scale(1.05); }
    </style>
</head>
<body>

<div id="loginPage" class="container-fluid">
    <div class="row w-100 justify-content-center">
        <div class="col-11 col-sm-8 col-md-6 col-lg-4 col-xl-3">
            <div class="custom-card text-center">
                <h3 class="mb-4">EuroLeague Login</h3>
                <form id="loginForm">
                    <div class="mb-3">
                        <input type="email" id="email" placeholder="Email (gmail.com)" class="form-control form-control-lg"
                               pattern="^[a-zA-Z0-9._%+-]+@gmail\.com$" required>
                    </div>
                    <div class="mb-3">
                        <input type="password" id="password" placeholder="Password" class="form-control form-control-lg" required>
                    </div>
                    <button type="submit" class="btn btn-warning btn-lg w-100 fw-bold">LOGIN</button>
                </form>
            </div>
        </div>
    </div>
</div>

<div id="menuPage" class="container page">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6 text-center custom-card">
            <h2 class="mb-4">Main Menu</h2>
            <div class="d-grid gap-3">
                <button class="btn btn-outline-primary btn-lg nav-btn" data-target="videoPage">Video Analysis</button>
                <button class="btn btn-outline-primary btn-lg nav-btn" data-target="keyPage">Key Moments</button>
                <button class="btn btn-outline-primary btn-lg nav-btn" data-target="statsPage">Player vs Team</button>
            </div>
        </div>
    </div>
</div>

<div id="videoPage" class="container page">
    <div class="row">
        <div class="col-12 mb-3">
            <button class="btn btn-sm btn-light" onclick="showPage('menuPage')">← Back to Menu</button>
        </div>
        <div class="col-12 text-center">
            <h3 class="mb-4">Video Analysis</h3>
            <img src="brown.png" class="img-fluid img-fluid-custom" alt="Analysis">
        </div>
    </div>
</div>

<div id="keyPage" class="container page">
    <div class="row">
        <div class="col-12 mb-3">
            <button class="btn btn-sm btn-light" onclick="showPage('menuPage')">← Back to Menu</button>
        </div>
        <div class="col-12 text-center">
            <h3 class="mb-4">Key Moments</h3>
        </div>
        <div class="col-md-6">
            <img src="kevinpunter.png" class="img-fluid img-fluid-custom" alt="Moment 1">
        </div>
        <div class="col-md-6">
            <img src="kevinpunter7.png" class="img-fluid img-fluid-custom" alt="Moment 2">
        </div>
    </div>
</div>

<div id="statsPage" class="container page">
    <div class="row justify-content-center">
        <div class="col-12 mb-3">
            <button class="btn btn-sm btn-light" onclick="showPage('menuPage')">← Back to Menu</button>
        </div>
        <div class="col-lg-10 text-center">
            <h3 class="mb-4">Player vs Team Performance</h3>
            <div class="table-responsive"> <img src="sigmascreenshot.png" class="img-fluid img-fluid-custom" alt="Stats">
            </div>
        </div>
    </div>
</div>

<script>
    function showPage(pageId){
        
        document.getElementById('loginPage').style.display = 'none';
        document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
        
        const target = document.getElementById(pageId);
        if(target.classList.contains('page')) {
            target.style.display = 'block';
        } else {
            target.style.display = 'flex'; // Za login koji koristi flex
        }
    }

    document.getElementById('loginForm').addEventListener('submit', function(e){
        e.preventDefault();
        const email = document.getElementById('email');
        if(email.checkValidity()){
            showPage('menuPage');
        } else {
            email.reportValidity();
        }
    });

    document.querySelectorAll('.nav-btn').forEach(btn=>{
        btn.addEventListener('click', ()=>{
            const target = btn.getAttribute('data-target');
            showPage(target);
        });
    });
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
